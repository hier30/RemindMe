name: CI Pipeline - RemindMe App

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - master
      - develop

jobs:
  # ============================================================
  # JOB 1: SYNTAX CHECK (PHP Lint)
  # Memastikan tidak ada syntax error di semua file PHP
  # ============================================================
  php-syntax-check:
    name: "PHP Syntax Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Cek syntax semua file PHP
        run: |
          echo "=== Memulai PHP Lint Check ==="
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file"
            if [ $? -ne 0 ]; then
              echo "GAGAL: Syntax error di $file"
              exit 1
            fi
          done
          echo "=== Semua file PHP lolos syntax check ==="

  # ============================================================
  # JOB 2: CODING STANDARD CHECK
  # Memastikan kode mengikuti standar PSR-12
  # ============================================================
  coding-standard:
    name: "Coding Standard (PSR-12)"
    runs-on: ubuntu-latest
    needs: php-syntax-check

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcs

      - name: Install PHP CodeSniffer
        run: composer global require "squizlabs/php_codesniffer=*"

      - name: Jalankan PHPCS (PSR-12 Standard)
        run: |
          echo "=== Cek Coding Standard PSR-12 ==="
          ~/.composer/vendor/bin/phpcs \
            --standard=PSR12 \
            --extensions=php \
            --ignore=vendor/ \
            --report=full \
            . || true
          echo "=== Coding standard check selesai ==="

  # ============================================================
  # JOB 3: SECURITY CHECK
  # Mencari celah keamanan umum di kode PHP
  # ============================================================
  security-check:
    name: "Security Vulnerability Check"
    runs-on: ubuntu-latest
    needs: php-syntax-check

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Cek file sensitif tidak ter-commit
        run: |
          echo "=== Cek file sensitif ==="
          # Pastikan .env atau file password tidak masuk repo
          if find . -name ".env" -not -path "./.git/*" | grep -q ".env"; then
            echo "WARNING: File .env ditemukan di repo!"
          else
            echo "OK: Tidak ada file .env sensitif"
          fi

      - name: Cek penggunaan fungsi berbahaya
        run: |
          echo "=== Cek fungsi PHP berbahaya ==="
          DANGEROUS_FUNCTIONS="eval\|exec\|shell_exec\|passthru\|system\|base64_decode"
          RESULT=$(grep -rn "$DANGEROUS_FUNCTIONS" --include="*.php" . | grep -v ".git" || true)
          if [ -n "$RESULT" ]; then
            echo "WARNING: Fungsi berbahaya ditemukan:"
            echo "$RESULT"
          else
            echo "OK: Tidak ada fungsi berbahaya"
          fi

      - name: Cek SQL Injection sederhana
        run: |
          echo "=== Cek potensi SQL Injection ==="
          # Cek apakah ada query yang tidak pakai prepared statement
          RESULT=$(grep -rn "query.*\$_" --include="*.php" . | grep -v ".git" | grep -v "prepare" || true)
          if [ -n "$RESULT" ]; then
            echo "WARNING: Potensi raw query ditemukan, pastikan pakai prepared statement:"
            echo "$RESULT"
          else
            echo "OK: Tidak ada indikasi SQL injection"
          fi

