name: CI/CD Pipeline - RemindMe

on:
  push:
    branches: [ main, master, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Job 1: Testing & Quality Check
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, sqlite, pdo_sqlite
          tools: composer, phpunit
      
      - name: Install dependencies
        run: |
          composer install --no-progress --no-suggest
      
      - name: Create SQLite database for testing
        run: |
          touch database.sqlite
          chmod 666 database.sqlite
      
      - name: Run PHPUnit tests
        run: |
          ./vendor/bin/phpunit --configuration phpunit.xml
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # Job 2: Code Quality Check (Syntax & Lint)
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      
      - name: Check PHP syntax errors
        run: |
          find . -name "*.php" ! -path "./vendor/*" -exec php -l {} \;
      
      - name: Install PHP_CodeSniffer
        run: |
          composer require --dev squizlabs/php_codesniffer
      
      - name: Run Code Sniffer (PSR-12 Standard)
        run: |
          ./vendor/bin/phpcs --standard=PSR12 --extensions=php --ignore=vendor/ .

  # Job 3: Security Check
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Run Security Checker
        run: |
          composer require --dev roave/security-advisories:dev-latest

  # Job 4: Build & Package (Simulasi)
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create build artifact
        run: |
          mkdir -p build/remindme
          cp -r *.php build/remindme/
          cp -r database.sqlite build/remindme/ 2>/dev/null || true
          zip -r remindme-build.zip build/
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: remindme-build
          path: remindme-build.zip

  # Job 5: Notification (Success/Failed)
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ CI/CD Pipeline SUCCESS!"
          else
            echo "❌ CI/CD Pipeline FAILED!"
            exit 1
          fi